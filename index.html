<!DOCTYPE html>
<html>
<head>
    <title>Student Notice Board</title>
    <style>/* ===== GENERAL STYLES ===== */
body {
    font-family: Arial, sans-serif;
    background: #f2f2f2;
    margin: 0;
    padding: 0;
}
.container {
    width: 50%;
    margin: 40px auto;
    background: white;
    padding: 20px;
    box-sizing: border-box;
}
input, textarea, select {
    width: 100%;
    padding: 8px;
    margin: 5px 0;
    box-sizing: border-box;
}
button {
    padding: 8px;
    background: #007bff;
    color: white;
    border: none;
    cursor: pointer;
    border-radius: 5px;
}
button:hover {
    opacity: 0.9;
}
.notice {
    background-color: white;
    padding: 12px;
    margin-bottom: 12px;
    border-radius: 8px;
    border: 2px solid #ccc;
}
.notice.unread {
    border: 3px solid red !important;
    background-color: #ffecec;
}
.unread-text {
    color: red;
    font-weight: bold;
}
/* ===== SAVED NOTICES SECTION ===== */
#savedNoticeList {
    margin-top: 15px;
}
#savedNoticeList .notice {
    border: 2px solid #2196F3; /* Blue border for saved notices */
    background-color: #e3f2fd; /* Light blue background */
}
body.dark #savedNoticeList .notice {
    border: 2px solid #64b5f6;
    background-color: #1565c0; /* Dark blue background for dark mode */
    color: #ffffff;
}
/* ===== DARK MODE ===== */
body.dark {
    background: #121212;
    color: #e0e0e0;
}
body.dark .container {
    background: #1e1e1e;
    color: #ffffff;
}
body.dark input,
body.dark textarea,
body.dark select {
    background: #2a2a2a;
    color: #ffffff;
    border: 1px solid #555;
}
body.dark button {
    background: #333;
    color: #ffffff;
}
body.dark .notice {
    background: #1f1f1f;
    color: #ffffff;
    border: 2px solid #555;
}
body.dark .notice small {
    color: #cccccc;
}
body.dark .unread-text {
    color: #ff6b6b;
}
/* ===== COLLEGE HEADER ===== */
.college-header {
    width: 100%;
    background-color: #0d47a1;
    color: white;
    display: flex;
    align-items: center;
    padding: 20px 30px;
    gap: 20px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.2);
    border-radius: 8px;
    margin-bottom: 30px;
    box-sizing: border-box;
}
.college-header .college-logo {
    width: 100px;
    height: auto;
}
.college-header .college-info {
    display: flex;
    flex-direction: column;
    text-align: left;
}
.college-header .college-info h1 {
    margin: 0;
    font-size: 28px;
    font-weight: 800;
}
.college-header .college-info p {
    margin: 2px 0;
    font-size: 16px;
}
.college-header .college-info .minority {
    color: #ffeb3b;
    font-weight: bold;
}
body.dark .college-header {
    background-color: #1e1e1e;
    color: #ffffff;
    box-shadow: 0 4px 10px rgba(255,255,255,0.1);
}
/* ===== RESPONSIVENESS FIX ===== */
@media (max-width: 768px) {
    .container {
        width: 90%;
    }
    .college-header {
        flex-direction: column;
        text-align: center;
    }
    .college-header .college-logo {
        width: 80px;
        margin-bottom: 10px;
    }
}</style>
</head>
<body class="student-page">

<button id="darkBtn" style="float:right; margin:15px;">&#127769; Dark Mode</button>

<div class="college-header">
    <img src="college-logo.png" alt="College Logo" class="college-logo">
    <div class="college-info">
        <h1>WAVOO WAJEEHA WOMEN&#39;S COLLEGE OF ARTS AND SCIENCE</h1>
        <p>Kayalpattinam &#8211; 628204</p>
        <p>(Affiliated to Manonmaniam Sundaranar University)</p>
        <p><strong>NAAC:</strong> B++</p>
    </div>
</div>

<div class="container">
    <h2>Student Notice Board</h2>
    <select id="yearFilter">
        <option value="All">All Years</option>
        <option value="I">I</option>
        <option value="II">II</option>
        <option value="III">III</option>
    </select>
    <select id="categoryFilter">
        <option value="All">All</option>
        <option value="General">General</option>
        <option value="Exam">Exam</option>
        <option value="Event">Event</option>
    </select>
    <div id="noticeList"></div>
    <button id="toggleSavedBtn" style="margin-top:15px;">View Saved Notices</button>
    <div id="savedNoticeList" style="display:none;"></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.4.0/firebase-app.js";
import { getDatabase, ref, get, update } from "https://www.gstatic.com/firebasejs/10.4.0/firebase-database.js";

const firebaseConfig = {
    apiKey: "AIzaSyBMHtfDrYlaAFE49lVTvmJ2MWdQnuAPJro",
    authDomain: "digital-notice-board-27c9c.firebaseapp.com",
    databaseURL: "https://digital-notice-board-27c9c-default-rtdb.firebaseio.com",
    projectId: "digital-notice-board-27c9c",
    storageBucket: "digital-notice-board-27c9c.firebasestorage.app",
    messagingSenderId: "835434924523",
    appId: "1:835434924523:web:2558d4d4f6cfcbb97671ae"
};

const app = initializeApp(firebaseConfig);
const db  = getDatabase(app);

let allNotices = [];
let noticeKeys = {};

function getSaved() {
    try { return JSON.parse(localStorage.getItem("savedNotices") || "[]"); }
    catch(e) { return []; }
}
function setSaved(arr) {
    localStorage.setItem("savedNotices", JSON.stringify(arr));
}

function toggleSave(notice) {
    let saved = getSaved();
    let idx = saved.findIndex(n => n.timestamp === notice.timestamp);
    if (idx === -1) saved.push(notice);
    else saved.splice(idx, 1);
    setSaved(saved);
    renderAll();
}

async function loadNotices() {
    try {
        const snap = await get(ref(db, "notices"));
        if (snap.exists()) {
            const data = snap.val();
            allNotices = [];
            noticeKeys = {};
            for (const key in data) {
                allNotices.push(data[key]);
                noticeKeys[data[key].timestamp] = key;
            }
            allNotices.sort((a, b) => b.timestamp - a.timestamp);
        } else { allNotices = []; }
        renderAll();
    } catch(e) {
        document.getElementById("noticeList").innerHTML =
            "<p style=\"color:red;text-align:center;\">Failed to load notices.</p>";
    }
}

async function markRead(notice) {
    if (notice.read) return;
    const key = noticeKeys[notice.timestamp];
    if (!key) return;
    try {
        await update(ref(db, "notices/" + key), { read: true });
        notice.read = true;
        renderAll();
    } catch(e) { console.error(e); }
}

function buildCard(n, inSavedPanel) {
    let saved = getSaved();
    let alreadySaved = saved.some(s => s.timestamp === n.timestamp);

    let card = document.createElement("div");
    card.className = "notice" + (!n.read && !inSavedPanel ? " unread" : "");
    if (inSavedPanel) {
        card.style.borderColor = "#2196F3";
        card.style.backgroundColor = "#e3f2fd";
    }

    let info = document.createElement("div");
    info.innerHTML =
        "<b>" + n.title + "</b> (" + n.cat + ") [" + n.year + "]<br>" +
        n.msg + "<br><small>Valid till: " + n.expiry + "</small>";
    card.appendChild(info);

    // ONE button — shows Save or Unsave depending on saved state
    let btn = document.createElement("button");
    btn.textContent = alreadySaved ? "Unsave" : "Save";
    btn.style.marginTop = "8px";
    btn.onclick = function(e) {
        e.stopPropagation();
        toggleSave(n);
    };
    card.appendChild(btn);

    if (!inSavedPanel) {
        card.onclick = function() { markRead(n); };
    }
    return card;
}

function renderNotices() {
    let list = document.getElementById("noticeList");
    let today = new Date().toISOString().split("T")[0];
    let y = document.getElementById("yearFilter").value;
    let c = document.getElementById("categoryFilter").value;
    let data = allNotices.filter(n => n.expiry >= today);
    if (y !== "All") data = data.filter(n => n.year === y);
    if (c !== "All") data = data.filter(n => n.cat === c);
    data.sort((a, b) => b.timestamp - a.timestamp);
    list.innerHTML = "";
    if (data.length === 0) {
        list.innerHTML = "<p style=\"text-align:center;color:#888;margin-top:20px;\">No notices found.</p>";
        return;
    }
    data.forEach(n => list.appendChild(buildCard(n, false)));
}

function renderSaved() {
    let panel = document.getElementById("savedNoticeList");
    if (panel.style.display === "none") return;
    let saved = getSaved();
    panel.innerHTML = "";
    if (saved.length === 0) {
        panel.innerHTML = "<p>No saved notices.</p>";
        return;
    }
    // Show saved notices — each card has Unsave button built in via buildCard
    saved.forEach(n => panel.appendChild(buildCard(n, true)));
}

function renderAll() {
    renderNotices();
    renderSaved();
}

document.getElementById("yearFilter").addEventListener("change", renderAll);
document.getElementById("categoryFilter").addEventListener("change", renderAll);

document.getElementById("darkBtn").addEventListener("click", function() {
    document.body.classList.toggle("dark");
    localStorage.setItem("dark_student", document.body.classList.contains("dark") ? "on" : "off");
});

document.getElementById("toggleSavedBtn").addEventListener("click", function() {
    let panel = document.getElementById("savedNoticeList");
    let btn   = document.getElementById("toggleSavedBtn");
    if (panel.style.display === "none") {
        panel.style.display = "block";
        btn.textContent = "Hide Saved Notices";
        renderSaved();
    } else {
        panel.style.display = "none";
        btn.textContent = "View Saved Notices";
    }
});

if (localStorage.getItem("dark_student") === "on") {
    document.body.classList.add("dark");
}

loadNotices();
</script>
</body>
</html>
